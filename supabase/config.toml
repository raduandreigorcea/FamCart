# Minimal Supabase CLI config: enough for `supabase db start` + `supabase test db`
# (local RLS/pgTAP tests and CI). All other settings use CLI defaults; run
# `supabase init` to expand this if the full local stack is ever needed.
project_id = "famcart"

# Database webhooks carry no user JWT; the function authenticates its caller
# with the PUSH_WEBHOOK_SECRET header instead.
[functions.push-on-item-insert]
verify_jwt = false
