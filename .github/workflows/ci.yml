name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    name: Typecheck, unit tests, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  rls-tests:
    name: Database RLS tests (pgTAP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      # Starts local Postgres and applies supabase/migrations, then runs the
      # pgTAP suites in supabase/tests.
      - run: supabase db start
      - run: supabase test db
